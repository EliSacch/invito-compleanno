<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conferma</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&family=Passions+Conflict&display=swap"
      rel="stylesheet"
    />

    <script src="scripts.js"></script>

    <script src="confirmed.js" defer></script>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Confermato</h1>

      <p>Inviami uno screenshot di questo biglietto</p>

      <div class="ticket-wrapper">
        <div class="ticket">
          <div class="circle top-left outer-b"></div>
          <div class="circle bottom-left outer"></div>
          <div class="circle top-right outer"></div>
          <div class="circle bottom-right outer"></div>

          <div class="circle top-left inner-b"></div>
          <div class="circle bottom-left inner-b"></div>
          <div class="circle top-right inner-b"></div>
          <div class="circle bottom-right inner-b"></div>

          <div class="inner">
            <div class="stars">
              <div class="star">★</div>
              <div class="star">★</div>
              <div class="star">★</div>
            </div>

            <div class="center">
              <div class="small-text">ADMIT ONE</div>

              <div class="title">TICKET</div>

              <div class="small-text">ADMIT ONE</div>
            </div>

            <div class="stars">
              <div class="star">★</div>
              <div class="star">★</div>
              <div class="star">★</div>
            </div>
          </div>
        </div>
      </div>
      <div class="theatre-ticket">
        <div class="theatre-left">
          <br />
          <p class="ticket-label">SPETTACOLO</p>

          <p id="conf-show">---</p>

          <br />
        </div>

        <div class="ticket-right">
          <div>
            <p>DATA & ORA</p>
            <span id="conf-datetime">--:--</span>
          </div>
        </div>
      </div>
    </main>

    <button id="modifica">>> Ho cambiato idea <<</button>
  </body>
</html>
